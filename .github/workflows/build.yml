name: Build Mod Jar

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Debug - find real method names
        run: |
          ./gradlew genSources --no-daemon || true
          FILE=$(find / -iname "MultiPlayerGameMode.java" 2>/dev/null | head -1)
          echo "===== FOUND FILE: $FILE ====="
          if [ -n "$FILE" ]; then cat "$FILE"; else echo "NOT FOUND"; fi

      - name: Build with Gradle Wrapper
        run: ./gradlew build --no-daemon

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: totemautoequip-jar
          path: build/libs/*.jar
