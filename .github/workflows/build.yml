name: Build Mod Jar

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Debug and Build
        run: |
          ./gradlew genSources --no-daemon || true
          echo "===== SEARCHING FOR SOURCES JAR ====="
          CANDIDATES=$(find / -iname "*sources*.jar" 2>/dev/null)
          echo "$CANDIDATES"
          FOUND=0
          for j in $CANDIDATES; do
            if unzip -l "$j" 2>/dev/null | grep -q "MultiPlayerGameMode.java"; then
              echo "===== FOUND IN JAR: $j ====="
              PATH_IN_JAR=$(unzip -l "$j" | grep "MultiPlayerGameMode.java" | awk '{print $NF}')
              echo "===== PATH: $PATH_IN_JAR ====="
              unzip -p "$j" "$PATH_IN_JAR"
              FOUND=1
              break
            fi
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "STILL NOT FOUND"
          fi
          echo "===== NOW BUILDING ====="
          ./gradlew build --no-daemon

      - name: Upload built jar
        uses: actions/upload-artifact@v4
        with:
          name: totemautoequip-jar
          path: build/libs/*.jar
